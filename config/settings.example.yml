server:
  name: Home Server

links:
  guacamole:
    label: Guacamole
    url: /guacamole/
  portainer:
    label: Portainer
    url: https://server-ip:9443/
  cockpit:
    label: Cockpit
    url: https://server-ip:9090/

docker:
  allowed_containers:
    - scp-portainer
    - scp-guacamole
    - scp-guacd
    - scp-guacamole-db

remote_desktop:
  protocol: RDP
  guacamole_url: /guacamole/
  rdp_host: host.docker.internal
  rdp_port: 3389
  vnc_host: host.docker.internal
  vnc_port: 5900
