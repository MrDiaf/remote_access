name: server-control-panel

services:
  reverse-proxy:
    image: caddy:2.8-alpine
    container_name: scp-proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "${DASHBOARD_BIND:-0.0.0.0}:${DASHBOARD_HTTP_PORT:-8080}:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: scp-frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: scp-backend
    env_file:
      - .env
    environment:
      CONFIG_DIR: /config
      DATA_DIR: /data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/config:ro
      - ./scripts:/scripts:ro
      - backend-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: scp-portainer
    ports:
      - "${PORTAINER_BIND:-127.0.0.1}:${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  guacamole-db:
    image: postgres:16-alpine
    container_name: scp-guacamole-db
    profiles:
      - remote
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-guacamole_db}"
      POSTGRES_USER: "${POSTGRES_USER:-guacamole_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - guacamole-db-data:/var/lib/postgresql/data
      - ./data/guacamole/initdb.sql:/docker-entrypoint-initdb.d/001-initdb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.5.5
    container_name: scp-guacd
    profiles:
      - remote
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: scp-guacamole
    profiles:
      - remote
    depends_on:
      guacd:
        condition: service_started
      guacamole-db:
        condition: service_healthy
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: guacamole-db
      POSTGRESQL_DATABASE: "${POSTGRES_DB:-guacamole_db}"
      POSTGRESQL_USER: "${POSTGRES_USER:-guacamole_user}"
      POSTGRESQL_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    ports:
      - "${GUACAMOLE_BIND:-127.0.0.1}:${GUACAMOLE_HTTP_PORT:-8081}:8080"
    restart: unless-stopped

volumes:
  backend-data:
  caddy-data:
  caddy-config:
  portainer-data:
  guacamole-db-data:
